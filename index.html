<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Milan SUHI Data Cube Interactive Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>

<style>
:root{
  --bg:#0b1020;
  --panel:#111827;
  --text:#f8fafc;
  --muted:#94a3b8;
  --shadow:0 24px 70px rgba(0,0,0,0.42);
}

*{box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  font-family:Inter,system-ui;
}

/* =========================
   ✅ ① 自适应主布局优化
========================= */
#app{
  display:grid;
  grid-template-columns: minmax(0,1fr) minmax(320px,420px);
  grid-template-rows:72px 1fr;
  width:100vw;
  height:100vh;
}

/* header */
header{
  grid-column:1/-1;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:#111827;
}

/* map */
#map-wrap{position:relative;min-width:0;}
#map{width:100%;height:100%;}

/* side */
#side-panel{
  background:var(--panel);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-width:0;
}

/* =========================
   timeline card（核心优化）
========================= */
#timeline-card{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;

  width:min(760px,calc(100vw - 36px));
  background:rgba(15,23,42,0.86);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:12px 14px;
}

/* ✔ year 自适应字体 */
#year-label{
  font-size:clamp(22px,3vw,34px);
  font-weight:800;
  color:#fb7185;
}

/* =========================
   basemap 控件优化（重点）
========================= */
.basemap-control{
  position:absolute;
  right:18px;
  bottom:24px;

  width:fit-content;
  max-width:220px;
  min-width:unset;

  padding:10px;
  border-radius:14px;
  background:rgba(15,23,42,0.86);
  box-shadow:var(--shadow);
}

.basemap-control select{
  width:auto;
  min-width:160px;
  max-width:100%;
}

/* =========================
   legend
========================= */
.legend-card{
  position:absolute;
  left:18px;
  top:18px;
  width:280px;
  background:rgba(15,23,42,0.85);
  border-radius:16px;
  padding:12px;
}

/* =========================
   map toggle
========================= */
.map-layer-toggle{
  position:absolute;
  right:18px;
  top:78px;
  min-width:160px;
}

/* =========================
   responsive
========================= */
@media(max-width:1060px){
  #app{
    grid-template-columns:1fr;
    grid-template-rows:72px 55vh 45vh;
  }
}

@media(max-width:680px){
  #timeline-card{
    left:10px;
    right:10px;
    bottom:10px;
  }

  .basemap-control{
    right:10px;
    bottom:110px;
    max-width:180px;
  }

  #year-label{
    font-size:clamp(20px,6vw,28px);
  }

  .legend-card{
    left:10px;
    right:10px;
    width:auto;
  }
}

</style>
</head>

<body>
<div id="app">

<header>
  <div>Milan SUHI Explorer</div>
</header>

<main id="map-wrap">
  <div id="map"></div>

  <!-- timeline -->
  <div id="timeline-card">
    <div>
      <span id="year-label">2024</span>
      <span style="color:#94a3b8;font-size:12px;">Displayed year</span>
    </div>
  </div>

  <!-- basemap -->
  <div class="basemap-control">
    <label>Base map</label>
    <select>
      <option>Google Satellite</option>
      <option>OSM</option>
    </select>
  </div>

</main>

<aside id="side-panel"></aside>

</div>
</body>
</html>
